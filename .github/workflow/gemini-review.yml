name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Diperlukan agar bot bisa meninggalkan komentar di PR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gemini AI Review
        # Menggunakan salah satu Action populer dari komunitas di GitHub Marketplace
        uses: champ96k/champ-ai-code-review@v1.2 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Disediakan otomatis oleh GitHub
          google_api_key: ${{ secrets.GEMINI_API_KEY }}